{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRICIFY{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-inner">
            <a href="/" class="brand">
                <img src="{% static 'images/logo.svg' %}" alt="CRICIFY Logo">
                <span>CRICIFY</span>
            </a>

            <nav class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'matches' %}">Matches</a>
                <a href="{% url 'news' %}">News</a>
                <a href="{% url 'teams' %}">Teams</a>
                <a href="{% url 'players' %}">Players</a>
                <a href="{% url 'points_table' %}">Points Table</a>
                <a href="{% url 'live_scores' %}" style="color:var(--accent);font-weight:700">🔴 Live</a>
                <a href="/admin/">Admin</a>
            </nav>

            <button id="themeToggle" class="theme-btn">Toggle Theme</button>
        </div>
    </header>

    <main class="container page-space">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 CRICIFY. All rights reserved.</p>
        </div>
    </footer>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
